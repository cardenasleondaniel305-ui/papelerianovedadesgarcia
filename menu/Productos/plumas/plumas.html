<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

/* ===================== */
/* MENÚ */
/* ===================== */

.menu-navegacion{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.menu-navegacion a{
    text-decoration:none;
    background:#9a24e2;
    color:white;
    padding:10px 15px;
    border-radius:8px;
}

/* ===================== */
/* LOGO */
/* ===================== */

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:220px;
}

/* ===================== */
/* PRODUCTOS */
/* ===================== */

#contenedorProductos{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:20px;
}

/* ===================== */
/* TARJETA */
/* ===================== */

.card{

    background:white;
    border-radius:15px;
    padding:20px;

    box-shadow:
    0 4px 10px rgba(0,0,0,0.1);

}

.card img{

    width:100%;
    height:220px;
    object-fit:contain;
    margin-bottom:15px;

}

.card h2{
    color:#333;
}

select,
button{

    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;

}

button{

    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;

}

button:hover{
    background:#0056b3;
}

/* ===================== */
/* CARRITO */
/* ===================== */

.carrito{

    margin-top:40px;
    background:white;
    padding:20px;
    border-radius:15px;

    box-shadow:
    0 4px 10px rgba(0,0,0,0.1);

}

.item{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.total{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

</style>

</head>

<body>

<!-- ===================== -->
<!-- NAVEGACIÓN -->
<!-- ===================== -->

<nav class="menu-navegacion">

<a href="../../index.html">

Inicio

</a>

<a href="javascript:history.back()">

Volver

</a>

</nav>

<!-- ===================== -->
<!-- LOGO -->
<!-- ===================== -->

<div class="logo">

<img
src="../../images/papeleria_novedades_garcia_logo_transparente.png"
alt="Logo">

</div>

<!-- ===================== -->
<!-- PRODUCTOS -->
<!-- ===================== -->

<div id="contenedorProductos">

</div>

<!-- ===================== -->
<!-- CARRITO -->
<!-- ===================== -->

<div class="carrito">

<h2>

Carrito de Compras

</h2>

<div id="listaCarrito">

</div>

<div class="total">

Total:
$<span id="total">0</span>

MXN

</div>

<button onclick="vaciarCarrito()">

Vaciar carrito

</button>

</div>

<!-- ===================== -->
<!-- SCRIPT -->
<!-- ===================== -->

<script>

// ======================================
// OBTENER CATEGORÍA AUTOMÁTICA
// ======================================

// Obtiene el nombre del archivo actual
// Ejemplo:
// plumas.html => plumas

let paginaActual =

window.location.pathname
.split("/")
.pop()
.replace(".html","")
.toLowerCase();

// ======================================
// OBTENER PRODUCTOS
// ======================================

function obtenerProductos(){

    return JSON.parse(
        localStorage.getItem("productos")
    ) || [];

}

// ======================================
// FILTRAR PRODUCTOS
// ======================================

function obtenerProductosCategoria(){

    let productos = obtenerProductos();

    return productos.filter(producto => {

        if(!producto.categoria) return false;

        return producto.categoria
        .toLowerCase()
        === paginaActual;

    });

}

// ======================================
// MOSTRAR PRODUCTOS
// ======================================

function mostrarProductos(){

    let contenedor =

    document.getElementById(
    "contenedorProductos"
    );

    contenedor.innerHTML = "";

    let productosCategoria =
    obtenerProductosCategoria();

    // SI NO HAY PRODUCTOS

    if(productosCategoria.length === 0){

        contenedor.innerHTML = `

        <h2>

        No hay productos registrados

        </h2>

        `;

        return;

    }

    // ======================================
    // AGRUPAR POR NOMBRE
    // ======================================

    let agrupados = {};

    productosCategoria.forEach(producto => {

        let nombre = producto.nombre;

        if(!agrupados[nombre]){

            agrupados[nombre] = [];

        }

        agrupados[nombre].push(producto);

    });

    // ======================================
    // CREAR TARJETAS
    // ======================================

    Object.keys(agrupados).forEach(nombre => {

        let variantes =
        agrupados[nombre];

        let base =
        variantes[0];

        // ======================================
        // COLORES
        // ======================================

        let colores = [];

        variantes.forEach(v => {

            let colorLimpio =
            v.color.trim();

            if(
                !colores.includes(colorLimpio)
            ){

                colores.push(colorLimpio);

            }

        });

        // ======================================
        // CREAR CARD
        // ======================================

        let card =
        document.createElement("div");

        card.classList.add("card");

        card.innerHTML = `

        <img
        id="img-${nombre}"
        src="${base.imagen}">

        <h2>

        ${nombre}

        </h2>

        <!-- COLORES -->

        <select
        id="color-${nombre}">

        ${colores.map(color => `

        <option value="${color}">
        ${color}
        </option>

        `).join("")}

        </select>

        <!-- PRESENTACIÓN -->

        <select
        id="presentacion-${nombre}">

            <option value="unidad">
            Unidad
            </option>

            <option value="paquete">
            Paquete
            </option>

        </select>

        <!-- PRECIO -->

        <p>

        Precio:
        $

        <span id="precio-${nombre}">

        ${base.precioUnidad}

        </span>

        MXN

        </p>

        <button
        onclick="agregarCarrito('${nombre}')">

        Agregar al carrito

        </button>

        `;

        contenedor.appendChild(card);

        // ======================================
        // CAMBIAR PRECIO
        // ======================================

        let presentacion =

        document.getElementById(
        `presentacion-${nombre}`
        );

        let precioTexto =

        document.getElementById(
        `precio-${nombre}`
        );

        presentacion.addEventListener(
        "change",
        function(){

            let tipo =
            this.value;

            if(tipo === "unidad"){

                precioTexto.textContent =
                base.precioUnidad;

            }else{

                precioTexto.textContent =
                base.precioPaquete;

            }

        });

    });

}

// ======================================
// AGREGAR AL CARRITO
// ======================================

function agregarCarrito(nombre){

    let productosCategoria =
    obtenerProductosCategoria();

    let producto =

    productosCategoria.find(p =>
    p.nombre === nombre);

    if(!producto){

        alert("Producto no encontrado");
        return;

    }

    let color =

    document.getElementById(
    `color-${nombre}`
    ).value;

    let presentacion =

    document.getElementById(
    `presentacion-${nombre}`
    ).value;

    let precio =

    presentacion === "unidad"
    ?

    Number(producto.precioUnidad)

    :

    Number(producto.precioPaquete);

    let carrito =

    JSON.parse(
    localStorage.getItem("carrito")
    )

    || [];

    carrito.push({

        nombre,
        color,
        presentacion,
        precio

    });

    localStorage.setItem(

        "carrito",

        JSON.stringify(carrito)

    );

    mostrarCarrito();

    alert("Producto agregado");

}

// ======================================
// MOSTRAR CARRITO
// ======================================

function mostrarCarrito(){

    let carrito =

    JSON.parse(
    localStorage.getItem("carrito")
    )

    || [];

    let lista =

    document.getElementById(
    "listaCarrito"
    );

    lista.innerHTML = "";

    let total = 0;

    carrito.forEach(item => {

        total += Number(item.precio);

        lista.innerHTML += `

        <div class="item">

        <strong>

        ${item.nombre}

        </strong>

        <br>

        Color:
        ${item.color}

        <br>

        Presentación:
        ${item.presentacion}

        <br>

        Precio:
        $${item.precio}

        </div>

        `;

    });

    document.getElementById(
    "total"
    ).textContent = total;

}

// ======================================
// VACIAR CARRITO
// ======================================

function vaciarCarrito(){

    localStorage.removeItem(
    "carrito"
    );

    mostrarCarrito();

    alert("Carrito vaciado");

}

// ======================================
// ACTUALIZAR AUTOMÁTICAMENTE
// ======================================

window.addEventListener(
"storage",
mostrarProductos
);

// ======================================
// INICIAR
// ======================================

mostrarProductos();

mostrarCarrito();

</script>
</body>

</html>
