<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Categorías de Productos</title>

<style>

/* ===================== */
/* ESTILOS GENERALES */
/* ===================== */

body{

    font-family: Arial, sans-serif;
    background:#e6ff44;
    margin:0;
    padding:0;

}

h1{

    text-align:center;
    margin-top:20px;
    color:#333;

}

/* ===================== */
/* HEADER */
/* ===================== */

header{

    background:#9a24e2;
    padding:15px;
    text-align:center;

}

header a{

    color:yellow;
    text-decoration:none;
    font-weight:bold;
    margin:0 10px;

}

header a:hover{

    color:#5fff9f;

}

/* ===================== */
/* CONTENEDOR CATEGORÍAS */
/* ===================== */

.categoria{

    margin-top:40px;
    padding:20px;

}

.categoria h2{

    color:#222;
    border-bottom:3px solid #9a24e2;
    padding-bottom:10px;

}

/* ===================== */
/* PRODUCTOS */
/* ===================== */

.productos{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    margin-top:20px;

}

.producto{

    background:white;
    border-radius:15px;
    padding:15px;
    text-align:center;

    box-shadow:
    0 4px 10px rgba(0,0,0,0.1);

}

.producto img{

    width:180px;
    height:180px;
    object-fit:contain;
    margin-bottom:10px;

}

.producto h3{

    margin:10px 0;
    color:#333;

}

.producto p{

    margin:5px 0;
    color:#555;

}

/* ===================== */
/* SELECT */
/* ===================== */

select{

    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;

}

/* ===================== */
/* BOTONES */
/* ===================== */

button{

    background:#007bff;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
    width:100%;

}

button:hover{

    background:#0056b3;

}

/* ===================== */
/* CARRITO */
/* ===================== */

.carrito{

    background:white;
    margin:40px 20px;
    padding:20px;
    border-radius:15px;

    box-shadow:
    0 4px 10px rgba(0,0,0,0.1);

}

.item-carrito{

    border-bottom:1px solid #ddd;
    padding:10px 0;

}

.total{

    margin-top:20px;
    font-size:22px;
    font-weight:bold;

}

</style>

</head>

<body>

<!-- ===================== -->
<!-- HEADER -->
<!-- ===================== -->

<header>

<a href="administrador.html">

Administrador

</a>

<a href="index.html">

Inicio

</a>

</header>

<!-- ===================== -->
<!-- TITULO -->
<!-- ===================== -->

<h1>

Papelería - Categorías Dinámicas

</h1>

<!-- ===================== -->
<!-- CONTENEDOR PRINCIPAL -->
<!-- ===================== -->

<div id="categoriasContainer"></div>

<!-- ===================== -->
<!-- CARRITO -->
<!-- ===================== -->

<div class="carrito">

<h2>Carrito de Compras</h2>

<div id="listaCarrito"></div>

<div class="total">

Total:
$<span id="total">0</span> MXN

</div>

</div>

<!-- ===================== -->
<!-- SCRIPT -->
<!-- ===================== -->

<script>

// ======================================
// OBTENER DATOS
// ======================================

let productos =

JSON.parse(
localStorage.getItem("productos")
)

|| [];

let categorias =

JSON.parse(
localStorage.getItem("categorias")
)

|| [];

// ======================================
// CONTENEDOR
// ======================================

let categoriasContainer =

document.getElementById(
"categoriasContainer"
);

// ======================================
// CREAR CATEGORÍAS
// ======================================

function mostrarCategorias(){

    categoriasContainer.innerHTML = "";

    categorias.forEach(categoria => {

        let productosCategoria =

        productos.filter(producto =>

            producto.categoria === categoria

        );

        // SI NO HAY PRODUCTOS

        if(productosCategoria.length === 0){

            return;

        }

        // CREAR BLOQUE

        let html = `

        <div class="categoria">

            <h2>${categoria}</h2>

            <div class="productos">

        `;

        // ======================================
        // AGRUPAR POR NOMBRE
        // ======================================

        let agrupados = {};

        productosCategoria.forEach(producto => {

            if(!agrupados[producto.nombre]){

                agrupados[producto.nombre] = [];

            }

            agrupados[producto.nombre]
            .push(producto);

        });

        // ======================================
        // CREAR TARJETAS
        // ======================================

        Object.keys(agrupados)
        .forEach(nombre => {

            let variantes =
            agrupados[nombre];

            let producto =
            variantes[0];

            // COLORES ÚNICOS

            let colores = [];

            variantes.forEach(v => {

                if(!colores.includes(v.color)){

                    colores.push(v.color);

                }

            });

            html += `

            <div class="producto">

                <img
                src="${producto.imagen}">

                <h3>
                ${producto.nombre}
                </h3>

                <p>

                Categoría:
                ${producto.categoria}

                </p>

                <select
                id="color-${nombre}">

                    <option value="">
                    Selecciona Color
                    </option>

                    ${colores.map(color => `

                    <option value="${color}">
                    ${color}
                    </option>

                    `).join("")}

                </select>

                <select
                id="presentacion-${nombre}">

                    <option value="">
                    Presentación
                    </option>

                    <option value="unidad">
                    Unidad
                    </option>

                    <option value="paquete">
                    Paquete
                    </option>

                </select>

                <button
                onclick="
                agregarCarrito(
                '${nombre}'
                )">

                Agregar al carrito

                </button>

            </div>

            `;

        });

        html += `

            </div>

        </div>

        `;

        categoriasContainer.innerHTML += html;

    });

}

// ======================================
// CARRITO
// ======================================

let total = 0;

function agregarCarrito(nombre){

    let color =

    document.getElementById(
    `color-${nombre}`
    ).value;

    let presentacion =

    document.getElementById(
    `presentacion-${nombre}`
    ).value;

    if(
        color === "" ||
        presentacion === ""
    ){

        alert(
        "Selecciona color y presentación"
        );

        return;

    }

    // BUSCAR PRODUCTO

    let producto =

    productos.find(p =>

        p.nombre === nombre &&
        p.color === color

    );

    let precio = 0;

    if(presentacion === "unidad"){

        precio =
        Number(producto.precioUnidad);

    }

    if(presentacion === "paquete"){

        precio =
        Number(producto.precioPaquete);

    }

    // CREAR ITEM

    let lista =

    document.getElementById(
    "listaCarrito"
    );

    let item =
    document.createElement("div");

    item.classList.add(
    "item-carrito"
    );

    item.innerHTML = `

    <strong>${nombre}</strong>

    <br>

    Color:
    ${color}

    <br>

    Presentación:
    ${presentacion}

    <br>

    Precio:
    $${precio} MXN

    `;

    lista.appendChild(item);

    total += precio;

    document.getElementById("total")
    .textContent = total;

}

// ======================================
// ACTUALIZAR AUTOMÁTICAMENTE
// ======================================

window.addEventListener(

    "storage",

    () => {

        productos =

        JSON.parse(
        localStorage.getItem("productos")
        ) || [];

        categorias =

        JSON.parse(
        localStorage.getItem("categorias")
        ) || [];

        mostrarCategorias();

    }

);

// ======================================
// INICIAR
// ======================================

mostrarCategorias();

</script>

</body>

</html>
