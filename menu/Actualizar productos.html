<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Administrador</title>

<style>

body{
    font-family: Arial;
    padding:20px;
    background:#fbff00;
}

.panel{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    max-width:600px;
    margin:auto;
}

input, select, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0056b3;
}

h1, h2{
    color:#333;
}

header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(#9a24e2);
    padding: 10px 20px;
}

.logo img{
    height: 100px;/*tamaño del logo*/
    width: auto; /*para que mantenga la proporcion*/
}

.redes-sociales img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    vertical-align: middle;
}
/*menu principal*/
.menu{
    display: flex;
    gap: 20px;
}

.menu > li{
    position: relative;
}

.menu > li > a{
    text-decoration: none;
    color: rgb(0, 0, 0);
    padding: 10px 15px;
    display: block;
    font-weight: bold;
}


.submenu li a{
    color: #333;
    padding: 10px 15px;
    display: block;
    text-decoration: none;
}

.submenu li a:hover{
    background-color: #5fff9f;
}

/* efecto hover en el menu principal*/
.menu > li > a:hover { 
    background-color: #5fff9f;
    border-radius: 5px;
}


/* submenu oculto por defecto */
.submenu {
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
    position: absolute;
    top: 40px;
    left: 0;
    background-color: #00ffc3;
    border-radius: 5px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

/*mostrar submenu al pasar el mouse */
.menu > li:hover .submenu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* redes sociales*/
.redes{
    display: flex;
    gap: 15px;
}

.redes a{
    color: white;
    font-size: 20px;
    text-decoration: none;
    transition: transform 0.2s;
}

.redes a:hover{
    transform: scale(1.2);
    color: #9d00ff;
}
/* Botón volver */
        .volver {
            text-align: center;
            margin-top: 20px;
        }

        .volver a {
            text-decoration: none;
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .volver a:hover {
            background-color: #219150;
        }
        
</style>

</head>
<body>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
<a href="Agregar productos.html"><button>Ver catálogo</button></a>
<nav class="menu-principal">
        <ul class="menu">
            <li>
                <a href="#">Servicios</a>
                <ul class="submenu">
                    <li><a href="servicios/papeleria/papelería.html">Papelería</a></li>
                    <li><a href="servicios/articulos de oficina/articulos de oficina.html">Artículos de Oficina</a></li>
                    <li><a href="servicios/material escolar/material escolar.html">Material Escolar</a></li>
                </ul>
            </li>
            
<div class="volver">
        <a href="index.html">Volver</a>
    </div>
<div class="panel">

<h1>Administrador</h1>

<!-- ===================== -->
<!-- CREAR CATEGORÍA -->
<!-- ===================== -->

<h2>Crear Categoría</h2>

<input
type="text"
id="nuevaCategoria"
placeholder="Ejemplo: Plumas">

<button onclick="crearCategoria()">
Crear Categoría
</button>

<hr>

<!-- ===================== -->
<!-- AGREGAR PRODUCTO -->
<!-- ===================== -->

<h2>Agregar Producto</h2>

<input
type="text"
id="nombre"
placeholder="Nombre del producto">

<input
type="number"
id="precioUnidad"
placeholder="Precio por unidad">

<input
type="number"
id="precioPaquete"
placeholder="Precio por paquete">

<input
type="text"
id="color"
placeholder="Colores disponibles Ej: Azul, Negro, Rojo">

<input
type="text"
id="imagen"
placeholder="URL de la imagen">

<select id="categoria">
</select>

<button onclick="guardarProducto()">
Agregar Producto
</button>

</div>

<script>

// ====================================
// CREAR CATEGORÍAS
// ====================================

function crearCategoria(){

    let nuevaCategoria =
    document.getElementById("nuevaCategoria")
    .value.trim();

    if(nuevaCategoria === ""){

        alert("Escribe una categoría");
        return;

    }

    let categorias =
    JSON.parse(localStorage.getItem("categorias"))
    || [];

    // Evitar repetidas

    if(categorias.includes(nuevaCategoria)){

        alert("La categoría ya existe");
        return;

    }

    categorias.push(nuevaCategoria);

    localStorage.setItem(
        "categorias",
        JSON.stringify(categorias)
    );

    cargarCategorias();

    alert("Categoría creada");

}

// ====================================
// CARGAR CATEGORÍAS
// ====================================

function cargarCategorias(){

    let categorias =
    JSON.parse(localStorage.getItem("categorias"))
    || [];

    let select =
    document.getElementById("categoria");

    select.innerHTML = "";

    categorias.forEach(categoria => {

        select.innerHTML += `

        <option value="${categoria}">
        ${categoria}
        </option>

        `;

    });

}

// ====================================
// GUARDAR PRODUCTOS
// ====================================

function guardarProducto(){

    let nombre =
    document.getElementById("nombre").value;

    let precioUnidad =
    document.getElementById("precioUnidad").value;

    let precioPaquete =
    document.getElementById("precioPaquete").value;

    let color =
    document.getElementById("color").value;

    let imagen =
    document.getElementById("imagen").value;

    let categoria =
    document.getElementById("categoria").value;

    if(
        nombre === "" ||
        precioUnidad === "" ||
        precioPaquete === "" ||
        color === "" ||
        imagen === ""
    ){

        alert("Completa todos los campos");
        return;

    }

    let producto = {

        nombre,
        precioUnidad,
        precioPaquete,
        color,
        imagen,
        categoria

    };

    // Obtener productos

    let productos =
    JSON.parse(localStorage.getItem("productos"))
    || [];

    // Agregar producto

    productos.push(producto);

    // Guardar

    localStorage.setItem(
        "productos",
        JSON.stringify(productos)
    );

    alert("Producto agregado");

    // Limpiar campos

    document.getElementById("nombre").value = "";
    document.getElementById("precioUnidad").value = "";
    document.getElementById("precioPaquete").value = "";
    document.getElementById("color").value = "";
    document.getElementById("imagen").value = "";

}

// ====================================
// INICIO
// ====================================

cargarCategorias();
if(localStorage.getItem("login") !== "true"){

window.location.href = "login.html";

}
function cerrarSesion(){
localStorage.removeItem("login");
window.location.href="index.html";
}

if(localStorage.getItem("rol") !== "admin"){

window.location.href="login.html";

}

</script>

</body>
</html>
