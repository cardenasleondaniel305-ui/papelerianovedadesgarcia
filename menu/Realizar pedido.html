<!DOCTYPE html> 
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="./css/styles.css">

<title>Realizar Pedido</title>

<style>

body{
    font-family: Arial;
    background-color: #f2f2f2;
    padding: 20px;
}

form{
    background: white;
    padding: 20px;
    width: 50%;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

input,
select,
textarea{
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border:1px solid #ccc;
}

button{
    background-color: #2c3e50;
    color: white;
    padding: 12px;
    border: none;
    cursor: pointer;
    border-radius:8px;
    width:100%;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background-color: #1a252f;
}

.botones{
    display:flex;
    gap:15px;
    margin-top:20px;
}

h2{
    text-align:center;
    color:#333;
}

</style>

</head>

<body>

<h2>Realizar Pedido</h2>

<form id="formPedido">

    <!-- NOMBRE -->

    <label>Nombre del cliente:</label>

    <input
    type="text"
    id="nombre"
    required>

    <!-- PRODUCTO -->

    <label>Producto:</label>

    <select id="producto">

        <option>Cuaderno</option>
        <option>Plumas</option>
        <option>Colores</option>
        <option>Mochila</option>
        <option>Lápices</option>
        <option>Marcatextos</option>

    </select>

    <!-- CANTIDAD -->

    <label>Cantidad:</label>

    <input
    type="number"
    id="cantidad"
    required>

    <!-- DIRECCIÓN -->

    <label>Dirección:</label>

    <textarea
    id="direccion"
    rows="4"
    placeholder="Escribe tu dirección"
    required></textarea>

    <!-- BOTONES -->

    <div class="botones">

        <button
        type="button"
        onclick="enviarWhatsApp()">

        Pedir por WhatsApp

        </button>

        <button
        type="button"
        onclick="enviarCorreo()">

        Pedir por Gmail

        </button>

    </div>

</form>
<div class="volver">
        <a href="index.html">Volver</a>
    </div>

<script>

// =====================================
// OBTENER DATOS
// =====================================

function obtenerDatos(){

    let nombre =
    document.getElementById("nombre").value;

    let producto =
    document.getElementById("producto").value;

    let cantidad =
    document.getElementById("cantidad").value;

    let direccion =
    document.getElementById("direccion").value;

    if(
        nombre === "" ||
        cantidad === "" ||
        direccion === ""
    ){

        alert("Completa todos los campos");
        return null;

    }

    return {

        nombre,
        producto,
        cantidad,
        direccion

    };

}

// =====================================
// ENVIAR POR WHATSAPP
// =====================================

function enviarWhatsApp(){

    let datos = obtenerDatos();

    if(datos === null){

        return;

    }

    let mensaje =

`Hola, quiero realizar un pedido:

Nombre: ${datos.nombre}

Producto: ${datos.producto}

Cantidad: ${datos.cantidad}

Dirección: ${datos.direccion}`;

    let numero = "5215660166303";

    let url =

`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    window.open(url,"_blank");

}

// =====================================
// ENVIAR POR GMAIL
// =====================================

function enviarCorreo(){

    let datos = obtenerDatos();

    if(datos === null){

        return;

    }

    let asunto =
    "Nuevo Pedido Papelería";

    let mensaje =

`Hola, quiero realizar un pedido:

Nombre: ${datos.nombre}

Producto: ${datos.producto}

Cantidad: ${datos.cantidad}

Dirección: ${datos.direccion}`;

    let correo =
    "garcianovedades1@gmail.com";

    let gmail =

`https://mail.google.com/mail/?view=cm&fs=1&to=${correo}&su=${encodeURIComponent(asunto)}&body=${encodeURIComponent(mensaje)}`;

    window.open(gmail,"_blank");

}

</script>

</body>
</html>
